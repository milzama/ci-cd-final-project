name: CI workflow

on:
  push:
    branches:
      - main
  pull_request:
    branches:
      - main

jobs:
  lint:
    runs-on: ubuntu-latest
    container:
      image: python:3.9-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install flake8

      - name: Lint dengan flake8 - error dan warning
        run: |
          flake8 service --count --select=E9,F63,F7,F82 --show-source --statistics

      - name: Lint dengan flake8 - kompleksitas dan panjang baris
        run: |
          flake8 service --count --max-complexity=10 --max-line-length=127 --statistics

  test:
    runs-on: ubuntu-latest
    container:
      image: python:3.9-slim
    steps:
      - name: Checkout
        uses: actions/checkout@v3

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install nose nose-spec

      - name: Jalankan pengujian unit dengan nose
        run: |
          nosetests -v  --with-coverage --cover-package=app