apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: cleanup
spec:
  description: This task will clean up a workspace by deleting all the files.
  workspaces:
    - name: source
  steps:
    - name: remove
      image: alpine:3
      env:
        - name: WORKSPACE_SOURCE_PATH
          value: $(workspaces.source.path)
      workingDir: $(workspaces.source.path)
      securityContext:
        runAsNonRoot: false
        runAsUser: 0
      script: |
        #!/usr/bin/env sh
        set -eu
        echo "Menghapus semua file dari ${WORKSPACE_SOURCE_PATH} ..."
        # Hapus semua konten yang ada di direktori jika ada.
        #
        # Kami tidak hanya "rm -rf ${WORKSPACE_SOURCE_PATH}" karena ${WORKSPACE_SOURCE_PATH} mungkin adalah "/"
        # atau root dari volume yang dipasang.
        if [ -d "${WORKSPACE_SOURCE_PATH}" ] ; then
          # Hapus file dan direktori yang tidak tersembunyi
          rm -rf "${WORKSPACE_SOURCE_PATH:?}"/*
          # Hapus file dan direktori yang diawali dengan . tetapi kecuali ..
          rm -rf "${WORKSPACE_SOURCE_PATH}"/.[!.]*
          # Hapus file dan direktori yang diawali dengan .. ditambah karakter lainnya
          rm -rf "${WORKSPACE_SOURCE_PATH}"/..?*
        fi

---

apiVersion: tekton.dev/v1beta1
kind: Task
metadata:
  name: nose
spec:
  description: This task runs Python tests using nose with given arguments.
  workspaces:
    - name: source
  params:
    - name: args
      description: Argumen yang akan diteruskan ke nose
      type: string
      default: "-v"
  steps:
    - name: nosetests
      image: python:3.9-slim
      workingDir: $(workspaces.source.path)
      script: |
        #!/bin/bash
        set -e
        python -m pip install --upgrade pip wheel
        pip install -r requirements.txt
        nosetests $(params.args)
